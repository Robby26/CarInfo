<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="管理您的車輛保養記錄、追蹤保養時程與里程提醒" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>" />
  <title>車輛保養管理系統</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
    }

    *, *::before, *::after { box-sizing: border-box; }
    body, h1, h2, h3, h4, p, ul, ol, figure { margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ── Header ── */
    .app-header {
      background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: var(--shadow-lg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: .03em; display: flex; align-items: center; gap: 10px; }
    .app-header h1 .icon { font-size: 1.5rem; }

    .btn-add-car {
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.4);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .875rem;
      font-weight: 600;
      transition: background .2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-add-car:hover { background: rgba(255,255,255,.3); }

    /* ── Layout ── */
    .app-body { display: flex; min-height: calc(100dvh - 64px); }

    .sidebar {
      width: 260px;
      background: #fff;
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      padding: 16px 0;
      flex-shrink: 0;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px 8px;
    }

    .sidebar-header-copy {
      flex: 1;
      min-width: 0;
    }

    .sidebar-title {
      font-size: .75rem;
      font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 0;
    }

    .sidebar-summary {
      display: none;
      margin-top: 4px;
      font-size: .82rem;
      font-weight: 600;
      color: var(--gray-500);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 68px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--gray-200);
      background: var(--gray-50);
      color: var(--gray-600);
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
    }
    .sidebar-toggle:hover { border-color: var(--primary); background: #eff6ff; color: var(--primary); }

    .sidebar:not(.mobile-mode).collapsed {
      width: 88px;
    }

    .sidebar:not(.mobile-mode).collapsed .sidebar-header {
      justify-content: center;
      padding: 0 10px 12px;
    }

    .sidebar:not(.mobile-mode).collapsed .sidebar-header-copy {
      display: none;
    }

    .sidebar:not(.mobile-mode).collapsed .sidebar-toggle {
      min-width: 52px;
      padding: 7px 8px;
      border-color: #bfdbfe;
      background: #eff6ff;
      color: var(--primary-dark);
    }

    .sidebar:not(.mobile-mode).collapsed .car-item {
      justify-content: center;
      padding: 10px 8px;
    }

    .sidebar:not(.mobile-mode).collapsed .car-avatar {
      margin: 0 auto;
    }

    .sidebar:not(.mobile-mode).collapsed .car-meta,
    .sidebar:not(.mobile-mode).collapsed .car-alerts {
      display: none;
    }

    .sidebar.mobile-mode {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--gray-200);
      padding: 0;
    }

    .sidebar.mobile-mode .sidebar-header { padding: 12px 16px 10px; }
    .sidebar.mobile-mode .sidebar-header-copy { display: block !important; }
    .sidebar.mobile-mode .sidebar-summary { display: block; }
    .sidebar.mobile-mode.collapsed .car-list { display: none; }
    .sidebar.mobile-mode.collapsed .sidebar-toggle { border-color: #bfdbfe; background: #eff6ff; color: var(--primary-dark); }
    .sidebar.mobile-mode .car-list { display: flex; overflow-x: auto; padding: 4px 8px 12px; }
    .sidebar.mobile-mode .car-item {
      flex-direction: column;
      text-align: center;
      gap: 4px;
      min-width: 80px;
      border-left: none;
      border-bottom: 3px solid transparent;
      padding: 8px;
    }
    .sidebar.mobile-mode .car-item.active { border-left-color: transparent; border-bottom-color: var(--primary); }
    .sidebar.mobile-mode .car-meta .car-plate { display: none; }

    .car-list { flex: 1; overflow-y: auto; }

    .car-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all .15s;
    }
    .car-item:hover { background: var(--gray-50); }
    .car-item.active { background: #eff6ff; border-left-color: var(--primary); }

    .car-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .car-item.active .car-avatar { background: #dbeafe; }

    .car-meta { flex: 1; min-width: 0; }
    .car-name { font-weight: 600; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .car-plate { font-size: .75rem; color: var(--gray-500); }

    .car-alerts {
      display: flex;
      gap: 4px;
    }
    .alert-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* ── Main content ── */
    .main { flex: 1; padding: 24px; overflow-y: auto; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      gap: 16px;
      color: var(--gray-400);
    }
    .empty-state .big-icon { font-size: 5rem; }
    .empty-state h2 { font-size: 1.25rem; color: var(--gray-500); font-weight: 600; }
    .empty-state p { font-size: .9rem; text-align: center; max-width: 300px; }

    /* Car detail */
    .car-detail-header {
      background: #fff;
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .car-detail-icon {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .car-detail-info { flex: 1; }
    .car-detail-info h2 { font-size: 1.3rem; font-weight: 700; }
    .car-detail-info .detail-meta { font-size: .85rem; color: var(--gray-500); margin-top: 4px; display: flex; gap: 16px; flex-wrap: wrap; }
    .detail-meta span { display: flex; align-items: center; gap: 4px; }

    .car-detail-actions { display: flex; gap: 8px; }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: .875rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { background: transparent; border-color: var(--gray-300); color: var(--gray-600); }
    .btn-outline:hover { background: var(--gray-50); border-color: var(--gray-400); }
    .btn-danger { background: transparent; border-color: #fca5a5; color: var(--danger); }
    .btn-danger:hover { background: #fef2f2; }
    .btn-sm { padding: 5px 10px; font-size: .8rem; }

    /* Summary cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .summary-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .summary-card .num { font-size: 1.8rem; font-weight: 700; }
    .summary-card .label { font-size: .75rem; color: var(--gray-500); margin-top: 4px; }
    .summary-card.ok .num { color: var(--success); }
    .summary-card.warn .num { color: var(--warning); }
    .summary-card.bad .num { color: var(--danger); }

    /* Section */
    .section {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--gray-100);
    }

    .section-header h3 { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }

    /* Maintenance table */
    .maint-table { width: 100%; border-collapse: collapse; }
    .maint-table th {
      font-size: .75rem;
      font-weight: 600;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 10px 16px;
      text-align: left;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
    }
    .maint-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--gray-100);
      font-size: .875rem;
      vertical-align: middle;
    }
    .maint-table tr:last-child td { border-bottom: none; }
    .maint-table tr:hover td { background: var(--gray-50); }

    /* Status badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
    }
    .badge-ok { background: #dcfce7; color: #15803d; }
    .badge-warn { background: #fef3c7; color: #b45309; }
    .badge-bad { background: #fee2e2; color: #b91c1c; }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* Progress bar */
    .progress-wrap { width: 100%; background: var(--gray-100); border-radius: 4px; height: 6px; min-width: 80px; }
    .progress-bar { height: 6px; border-radius: 4px; transition: width .3s; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }

    .modal {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      box-shadow: var(--shadow-lg);
      transform: translateY(20px);
      transition: transform .2s;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }
    .modal-overlay.show .modal { transform: translateY(0); }

    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }

    .btn-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: var(--gray-100);
      cursor: pointer;
      font-size: 1rem;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-close:hover { background: var(--gray-200); }

    .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-100); display: flex; gap: 8px; justify-content: flex-end; }

    /* Form */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .8rem; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: .9rem;
      font-family: inherit;
      color: var(--gray-800);
      transition: border-color .15s, box-shadow .15s;
      background: #fff;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    textarea { resize: vertical; min-height: 72px; }

    .form-hint { font-size: .75rem; color: var(--gray-400); margin-top: 4px; }

    /* Emoji picker */
    .emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .emoji-btn {
      width: 44px; height: 44px; border-radius: 10px;
      border: 2px solid var(--gray-200);
      background: var(--gray-50);
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .emoji-btn:hover { border-color: var(--primary); background: #eff6ff; }
    .emoji-btn.selected { border-color: var(--primary); background: #dbeafe; }

    /* Mileage input */
    .input-unit { position: relative; }
    .input-unit input { padding-right: 40px; }
    .input-unit .unit {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: .8rem;
      color: var(--gray-400);
      pointer-events: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .app-body { flex-direction: column; }
      .car-detail-header { flex-wrap: wrap; }
      .maint-table { display: block; overflow-x: auto; }
      .form-row { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* Toast notification */
    .toast-container { position: fixed; top: 80px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      background: #1f2937;
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: .875rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      transform: translateX(120%);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      max-width: 280px;
    }
    .toast.show { transform: translateX(0); }
    .toast.success { background: #166534; }
    .toast.error { background: #991b1b; }

    /* Mileage display */
    .km-label { font-size: .75rem; color: var(--gray-400); }

    /* Divider */
    .divider { width: 1px; background: var(--gray-200); margin: 0 4px; }

    .no-records {
      text-align: center;
      padding: 40px;
      color: var(--gray-400);
      font-size: .9rem;
    }
    .no-records .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }

    /* Tree table */
    .tree-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1.5px solid var(--gray-200);
      background: var(--gray-50);
      cursor: pointer;
      font-size: .7rem;
      color: var(--gray-500);
      transition: all .15s;
      flex-shrink: 0;
      margin-right: 8px;
      vertical-align: middle;
    }
    .tree-toggle:hover { border-color: var(--primary); color: var(--primary); background: #eff6ff; }
    .tree-toggle.open { transform: rotate(90deg); }
    .tree-child-row td { background: var(--gray-50); }
    .tree-child-row .child-indent {
      display: inline-block;
      width: 30px;
      text-align: center;
      color: var(--gray-300);
      font-size: .8rem;
      flex-shrink: 0;
      margin-right: 4px;
    }
    .tree-child-row td:first-child { padding-left: 20px; }
    .tree-group-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      background: var(--gray-200);
      font-size: .68rem;
      font-weight: 700;
      color: var(--gray-500);
      margin-left: 6px;
      vertical-align: middle;
    }

    /* View toggle tabs */
    .view-tabs { display: flex; gap: 0; border: 1.5px solid var(--gray-200); border-radius: 8px; overflow: hidden; }
    .view-tab {
      padding: 6px 14px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      border: none;
      color: var(--gray-500);
      transition: all .15s;
    }
    .view-tab:not(:last-child) { border-right: 1.5px solid var(--gray-200); }
    .view-tab.active { background: var(--primary); color: #fff; }
    .view-tab:hover:not(.active) { background: var(--gray-50); }

    /* Timeline */
    .timeline-filters {
      padding: 16px 20px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .timeline-filter-group { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .timeline-filter-group .filter-label { font-size: .75rem; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: .05em; margin-right: 4px; white-space: nowrap; }
    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 16px;
      border: 1.5px solid var(--gray-200);
      background: #fff;
      font-size: .78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      user-select: none;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: var(--primary); }
    .filter-chip.active { background: #dbeafe; border-color: var(--primary); color: var(--primary-dark); }
    .filter-chip input { display: none; }
    .filter-chip .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .filter-actions { display: flex; gap: 6px; margin-left: auto; }
    .filter-actions button {
      font-size: .72rem;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--gray-200);
      background: #fff;
      color: var(--gray-500);
      cursor: pointer;
      transition: all .15s;
    }
    .filter-actions button:hover { border-color: var(--primary); color: var(--primary); }

    .timeline-date-range {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: .8rem;
      color: var(--gray-500);
    }
    .timeline-date-range input[type="date"] {
      padding: 4px 8px;
      font-size: .78rem;
      width: auto;
      min-width: 130px;
    }

    .timeline-chart-area {
      padding: 20px;
      overflow-x: auto;
    }

    .timeline-chart {
      position: relative;
      min-width: 600px;
    }

    .tl-header-row {
      display: flex;
      border-bottom: 2px solid var(--gray-200);
      padding-bottom: 8px;
      margin-bottom: 4px;
    }
    .tl-label-col {
      width: 140px;
      flex-shrink: 0;
      font-size: .75rem;
      font-weight: 700;
      color: var(--gray-400);
    }
    .tl-dates-col {
      flex: 1;
      display: flex;
      justify-content: space-between;
      position: relative;
    }
    .tl-date-label {
      font-size: .68rem;
      color: var(--gray-400);
      text-align: center;
      width: 60px;
    }

    .tl-row {
      display: flex;
      align-items: center;
      min-height: 48px;
      border-bottom: 1px solid var(--gray-100);
    }
    .tl-row:last-child { border-bottom: none; }
    .tl-row-label {
      width: 140px;
      flex-shrink: 0;
      font-size: .82rem;
      font-weight: 600;
      color: var(--gray-700);
      padding-right: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tl-row-track {
      flex: 1;
      position: relative;
      height: 48px;
    }
    .tl-gridline {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--gray-100);
    }
    .tl-event {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;

<script>
// ─────────────────────────────────────────────
//  Data layer (IndexedDB)
// ─────────────────────────────────────────────
const DB_NAME = 'CarInfoDB';
const DB_VERSION = 1;
let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('cars')) {
        d.createObjectStore('cars', { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains('settings')) {
        d.createObjectStore('settings', { keyPath: 'key' });
      }
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror = () => reject(req.error);
  });
}

function dbGetAllCars() {
  return new Promise((resolve, reject) => {
    const req = _db.transaction('cars', 'readonly').objectStore('cars').getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function dbGetSetting(key) {
  return new Promise((resolve, reject) => {
    const req = _db.transaction('settings', 'readonly').objectStore('settings').get(key);
    req.onsuccess = () => resolve(req.result?.value ?? null);
    req.onerror = () => reject(req.error);
  });
}

function dbSaveAll(data) {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction(['cars', 'settings'], 'readwrite');
    const carStore = tx.objectStore('cars');
    const settingsStore = tx.objectStore('settings');
    carStore.clear();
    data.cars.forEach(car => carStore.put(car));
    settingsStore.put({ key: 'selectedCarId', value: data.selectedCarId });
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

function dbClearAll() {
  return new Promise((resolve, reject) => {
    if (!_db) { resolve(); return; }
    const tx = _db.transaction(['cars', 'settings'], 'readwrite');
    tx.objectStore('cars').clear();
    tx.objectStore('settings').clear();
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

function saveData(data) {
  if (!_db) return;
  dbSaveAll(data).catch(e => console.error('DB save error', e));
}

let appData = { cars: [], selectedCarId: null };
let editingCarId = null;
let editingMaintId = null;
const MOBILE_SIDEBAR_BREAKPOINT = 768;
let isMobileSidebarViewport = window.innerWidth <= MOBILE_SIDEBAR_BREAKPOINT;
let isSidebarCollapsed = isMobileSidebarViewport;

// ─────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────
function uid() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// Validate that a string is a safe ID (alphanumeric, hyphens, no injection)
function isSafeId(str) {
  return typeof str === 'string' && /^[a-zA-Z0-9_-]+$/.test(str);
}

function selectedCar() {
  return appData.cars.find(c => c.id === appData.selectedCarId) || null;
}

function syncSidebarViewportState() {
  const mobile = window.innerWidth <= MOBILE_SIDEBAR_BREAKPOINT;
  if (mobile !== isMobileSidebarViewport) {
    isMobileSidebarViewport = mobile;
    isSidebarCollapsed = mobile;
    return true;
  }
  return false;
}

const CAR_EMOJIS = ['🚗','🚙','🚕','🚌','🚐','🏎️','🚓','🚑','🚒','🛻','🚚','🚛','🛺','🏍️','🚐','🚤'];

// Default interval map (km)
const DEFAULT_INTERVALS = {
  '機油更換': 5000,
  '機油濾心': 5000,
  '空氣濾心': 20000,
  '冷氣濾網': 15000,
  '剎車油': 40000,
  '剎車來令片': 30000,
  '剎車來令片後': 40000,
  '剎車碟盤': 80000,
  '冷卻液': 40000,
  '變速箱油': 60000,
  '動力方向盤油': 60000,
  '火星塞': 30000,
  '正時皮帶': 100000,
  '輪胎換位': 10000,
  '輪胎更換': 50000,
  '輪胎氣壓': 1000,
  '電瓶': 60000,
  '雨刷': 20000,
  '定期保養': 10000,
};

// ─────────────────────────────────────────────
//  Status calculation
// ─────────────────────────────────────────────

// Return a map: type -> latest maintenance record (by mileage desc, then date desc)
function getLatestByType(maintenances) {
  const map = {};
  (maintenances || []).forEach(m => {
    const prev = map[m.type];
    if (!prev ||
        (Number(m.mileage) || 0) > (Number(prev.mileage) || 0) ||
        ((Number(m.mileage) || 0) === (Number(prev.mileage) || 0) && (m.date || '') > (prev.date || ''))) {
      map[m.type] = m;
    }
  });
  return map;
}

function getMaintStatus(maint, currentMileage) {
  const today = new Date();
  today.setHours(0,0,0,0);

  let kmStatus = 'ok';
  let kmPct = 0;

  if (maint.interval && maint.mileage != null) {
    const nextKm = Number(maint.mileage) + Number(maint.interval);
    const used = Math.max(0, currentMileage - Number(maint.mileage));
    kmPct = Math.min(1, used / Number(maint.interval));
    if (kmPct >= 1) kmStatus = 'bad';
    else if (kmPct >= 0.85) kmStatus = 'warn';
  }

  let dateStatus = 'ok';
  if (maint.nextDate) {
    const next = new Date(maint.nextDate);
    const diffDays = Math.round((next - today) / 86400000);
    if (diffDays < 0) dateStatus = 'bad';
    else if (diffDays <= 14) dateStatus = 'warn';
  }

  const overall = [kmStatus, dateStatus].includes('bad') ? 'bad'
    : [kmStatus, dateStatus].includes('warn') ? 'warn' : 'ok';

  return { kmStatus, dateStatus, kmPct, overall };
}

function getCarAlerts(car) {
  const km = car.mileage || 0;
  const latest = getLatestByType(car.maintenances);
  let bad = 0, warn = 0;
  Object.values(latest).forEach(m => {
    const s = getMaintStatus(m, km).overall;
    if (s === 'bad') bad++;
    else if (s === 'warn') warn++;
  });
  return { bad, warn };
}

// ─────────────────────────────────────────────
//  Render
// ─────────────────────────────────────────────
function renderAll() {
  renderSidebar();
  renderMain();
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const list = document.getElementById('carList');
  const summary = document.getElementById('sidebarSummary');
  const toggle = document.getElementById('sidebarToggle');
  const car = selectedCar();
  syncSidebarViewportState();
  const mobile = isMobileSidebarViewport;

  if (sidebar) {
    sidebar.classList.toggle('mobile-mode', mobile);
    sidebar.classList.toggle('collapsed', isSidebarCollapsed);
  }

  if (summary) {
    if (car) summary.textContent = `${car.emoji || '🚗'} ${car.name}`;
    else if (appData.cars.length) summary.textContent = `共 ${appData.cars.length} 部車輛`;
    else summary.textContent = '尚無車輛';
  }

  if (toggle) {
    const expanded = !isSidebarCollapsed;
    toggle.textContent = expanded ? '收合' : '展開';
    toggle.setAttribute('aria-expanded', String(expanded));
  }

  if (!appData.cars.length) {
    list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--gray-400);font-size:.8rem;">尚無車輛，請新增</div>';
    return;
  }
  list.innerHTML = appData.cars.map(car => {
    const { bad, warn } = getCarAlerts(car);
    const active = car.id === appData.selectedCarId ? ' active' : '';
    const dots = [
      ...Array(bad).fill(`<span class="alert-dot" style="background:var(--danger)"></span>`),
      ...Array(Math.min(warn, 3)).fill(`<span class="alert-dot" style="background:var(--warning)"></span>`),
    ].slice(0,4).join('');
    return `
      <div class="car-item${active}" role="button" tabindex="0" data-car-id="${escAttr(car.id)}">
        <div class="car-avatar">${car.emoji || '🚗'}</div>
        <div class="car-meta">
          <div class="car-name">${esc(car.name)}</div>
          <div class="car-plate">${esc(car.plate || '未設定車牌')}</div>
        </div>
        ${dots ? `<div class="car-alerts">${dots}</div>` : ''}
      </div>`;
  }).join('');

  // Bind events via delegation
  list.querySelectorAll('.car-item[data-car-id]').forEach(el => {
    const handler = () => selectCar(el.dataset.carId);
    el.addEventListener('click', handler);
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); } });
  });
}

function renderMain() {
  const main = document.getElementById('mainContent');
  const car = selectedCar();
  if (!car) {
    main.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">🚗</div>
        <h2>歡迎使用車輛保養管理</h2>
        <p>點擊右上角「新增車輛」開始管理您的愛車保養記錄</p>
        <button class="btn btn-primary" onclick="openCarModal()" style="margin-top:8px;">＋ 新增第一部車</button>
      </div>`;
    return;
  }

  const km = car.mileage || 0;
  const maintenances = car.maintenances || [];
  const latestMap = getLatestByType(maintenances);

  // Status counts only from latest record per type
  const latestList = Object.values(latestMap);
  const statuses = latestList.map(m => getMaintStatus(m, km).overall);
  const okCount = statuses.filter(s => s === 'ok').length;
  const warnCount = statuses.filter(s => s === 'warn').length;
  const badCount = statuses.filter(s => s === 'bad').length;

  // Group by type, each group sorted by mileage/date desc (latest first)
  const typeGroups = {};
  const typeOrder = [];
  maintenances.forEach(m => {
    if (!typeGroups[m.type]) {
      typeGroups[m.type] = [];
      typeOrder.push(m.type);
    }
    typeGroups[m.type].push(m);
  });
  Object.values(typeGroups).forEach(arr => {
    arr.sort((a, b) => {
      const mDiff = (Number(b.mileage) || 0) - (Number(a.mileage) || 0);
      if (mDiff !== 0) return mDiff;
      return (b.date || '').localeCompare(a.date || '');
    });
  });
  // Sort type groups by latest record's status severity
  typeOrder.sort((a, b) => {
    const la = latestMap[a], lb = latestMap[b];
    const order = { bad:0, warn:1, ok:2 };
    const sa = getMaintStatus(la, km), sb = getMaintStatus(lb, km);
    if (order[sa.overall] !== order[sb.overall]) return order[sa.overall] - order[sb.overall];
    return sb.kmPct - sa.kmPct;
  });

  function buildMaintInfo(m, isLatest) {
    const s = isLatest ? getMaintStatus(m, km) : { kmStatus:'ok', dateStatus:'ok', kmPct:0, overall:'ok' };
    const badgeClass = !isLatest ? 'badge-ok' : s.overall === 'bad' ? 'badge-bad' : s.overall === 'warn' ? 'badge-warn' : 'badge-ok';
    const badgeText = !isLatest ? '歷史紀錄' : s.overall === 'bad' ? '需要保養' : s.overall === 'warn' ? '即將到期' : '正常';
    const barColor = s.overall === 'bad' ? 'var(--danger)' : s.overall === 'warn' ? 'var(--warning)' : 'var(--success)';

    const nextKm = (isLatest && m.mileage != null && m.interval)
      ? `${fmtKm(Number(m.mileage) + Number(m.interval))} km` : '—';

    const remKm = (isLatest && m.mileage != null && m.interval)
      ? (() => {
          const r = (Number(m.mileage) + Number(m.interval)) - km;
          return r <= 0
            ? `<span style="color:var(--danger);font-weight:600;">超過 ${fmtKm(-r)} km</span>`
            : `<span style="color:${s.kmStatus==='warn'?'var(--warning)':'var(--success)'}">還有 ${fmtKm(r)} km</span>`;
        })() : '—';

    const nextDate = (isLatest && m.nextDate) ? formatDate(m.nextDate) : '—';
    const dateColor = isLatest ? (s.dateStatus === 'bad' ? 'var(--danger)' : s.dateStatus === 'warn' ? 'var(--warning)' : 'inherit') : 'inherit';

    const progressHtml = (isLatest && m.interval) ? `
      <div class="progress-wrap">
        <div class="progress-bar" style="width:${Math.min(100,Math.round(s.kmPct*100))}%;background:${barColor}"></div>
      </div>
      <div style="font-size:.72rem;color:var(--gray-400);margin-top:3px;">${Math.round(s.kmPct*100)}%</div>
    ` : '—';

    return { badgeClass, badgeText, nextKm, remKm, nextDate, dateColor, progressHtml };
  }

  let tableRows = '';
  if (!maintenances.length) {
    tableRows = `<tr><td colspan="8"><div class="no-records"><span class="icon">🔧</span>尚無保養記錄，點擊「新增保養」開始記錄</div></td></tr>`;
  } else {
    typeOrder.forEach(type => {
      const group = typeGroups[type];
      const latest = group[0];
      const children = group.slice(1);
      const hasChildren = children.length > 0;
      const groupId = 'grp_' + latest.id;
      const r = buildMaintInfo(latest, true);

      const toggleBtn = hasChildren
        ? `<span class="tree-toggle" data-toggle-group="${escAttr(groupId)}" id="tog_${escAttr(groupId)}">▶</span>`
        : `<span style="display:inline-block;width:30px;"></span>`;
      const countBadge = hasChildren ? `<span class="tree-group-count">${children.length}</span>` : '';

      tableRows += `
        <tr>
          <td>
            <div style="display:flex;align-items:center;">
              ${toggleBtn}
              <div>
                <div style="font-weight:600;">${esc(latest.type)}${countBadge}</div>
                ${latest.note ? `<div style="font-size:.75rem;color:var(--gray-400);margin-top:2px;">${esc(latest.note.substring(0,40))}${latest.note.length>40?'…':''}</div>` : ''}
              </div>
            </div>
          </td>
          <td>
            <div>${fmtKm(latest.mileage)} km</div>
            <div class="km-label">${formatDate(latest.date)}</div>
          </td>
          <td>${r.nextKm}</td>
          <td>${r.progressHtml}</td>
          <td>${r.remKm}</td>
          <td><span style="color:${r.dateColor}">${r.nextDate}</span></td>
          <td><span class="badge ${r.badgeClass}"><span class="badge-dot"></span>${r.badgeText}</span></td>
          <td>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-outline btn-sm" data-action="edit-maint" data-id="${escAttr(latest.id)}" aria-label="編輯">✏️</button>
              <button class="btn btn-danger btn-sm" data-action="delete-maint" data-id="${escAttr(latest.id)}" aria-label="刪除">🗑️</button>
            </div>
          </td>
        </tr>`;

      children.forEach(m => {
        tableRows += `
          <tr class="tree-child-row ${escAttr(groupId)}" style="display:none;">
            <td>
              <div style="display:flex;align-items:center;">
                <span class="child-indent">└</span>
                <div>
                  <div style="font-weight:500;color:var(--gray-600);">${esc(m.type)}</div>
                  ${m.note ? `<div style="font-size:.75rem;color:var(--gray-400);margin-top:2px;">${esc(m.note.substring(0,40))}${m.note.length>40?'…':''}</div>` : ''}
                </div>
              </div>
            </td>
            <td>
              <div>${fmtKm(m.mileage)} km</div>
              <div class="km-label">${formatDate(m.date)}</div>
            </td>
            <td>${(m.mileage != null && m.interval) ? fmtKm(Number(m.mileage) + Number(m.interval)) + ' km' : '—'}</td>
            <td>—</td>
            <td>—</td>
            <td>${m.nextDate ? formatDate(m.nextDate) : '—'}</td>
            <td><span class="badge badge-ok"><span class="badge-dot"></span>歷史紀錄</span></td>
            <td>
              <div style="display:flex;gap:6px;">
                <button class="btn btn-outline btn-sm" data-action="edit-maint" data-id="${escAttr(m.id)}" aria-label="編輯">✏️</button>
                <button class="btn btn-danger btn-sm" data-action="delete-maint" data-id="${escAttr(m.id)}" aria-label="刪除">🗑️</button>
              </div>
            </td>
          </tr>`;
      });
    });
  }

  main.innerHTML = `
    <!-- Car header -->
    <div class="car-detail-header">
      <div class="car-detail-icon">${car.emoji || '🚗'}</div>
      <div class="car-detail-info">
        <h2>${esc(car.name)}</h2>
        <div class="detail-meta">
          ${car.plate ? `<span>🪪 ${esc(car.plate)}</span>` : ''}
          ${car.brand ? `<span>🏷️ ${esc(car.brand)}</span>` : ''}
          ${car.year ? `<span>📅 ${car.year} 年</span>` : ''}
          ${car.purchaseDate ? `<span>🛒 購車：${formatDate(car.purchaseDate)}</span>` : ''}
          ${car.initialMileage ? `<span>🏁 初始里程：${fmtKm(car.initialMileage)} km</span>` : ''}
          <span>📍 目前里程：<strong>${fmtKm(km)} km</strong></span>
        </div>
      </div>
      <div class="car-detail-actions">
        <button class="btn btn-outline btn-sm" data-action="update-mileage" aria-label="更新里程">📍 更新里程</button>
        <button class="btn btn-outline btn-sm" data-action="edit-car" data-id="${escAttr(car.id)}" aria-label="編輯車輛">✏️ 編輯</button>
        <button class="btn btn-danger btn-sm" data-action="delete-car" data-id="${escAttr(car.id)}" aria-label="刪除車輛">🗑️</button>
      </div>
    </div>

    <!-- Summary -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="num" style="color:var(--primary)">${maintenances.length}</div>
        <div class="label">🔧 保養項目</div>
      </div>
      <div class="summary-card ${okCount>0?'ok':''}">
        <div class="num">${okCount}</div>
        <div class="label">✅ 狀態正常</div>
      </div>
      <div class="summary-card ${warnCount>0?'warn':''}">
        <div class="num">${warnCount}</div>
        <div class="label">⚠️ 即將到期</div>
      </div>
      <div class="summary-card ${badCount>0?'bad':''}">
        <div class="num">${badCount}</div>
        <div class="label">🔴 需要保養</div>
      </div>
    </div>

    <!-- Maintenance table / Timeline -->
    <div class="section">
      <div class="section-header">
        <h3>🔧 保養紀錄與提醒</h3>
        <div style="display:flex;gap:10px;align-items:center;">
          <div class="view-tabs">
            <button class="view-tab active" data-view="table">📋 表格</button>
            <button class="view-tab" data-view="timeline">📅 時間軸</button>
          </div>
          <button class="btn btn-primary btn-sm" data-action="add-maint">＋ 新增保養</button>
        </div>
      </div>
      <div id="tableView" style="overflow-x:auto;">
        <table class="maint-table">
          <thead>
            <tr>
              <th>保養項目</th>
              <th>上次保養</th>
              <th>下次建議里程</th>
              <th>使用進度</th>
              <th>剩餘里程</th>
              <th>日期提醒</th>
              <th>狀態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
      <div id="timelineView" style="display:none;">
        <!-- rendered by renderTimeline() -->
      </div>
    </div>
  `;

  // Bind event delegation on main content
  bindMainEvents(main);

  // Restore view state
  if (currentView === 'timeline') {
    const tv = document.getElementById('tableView');
    const tlv = document.getElementById('timelineView');
    if (tv) tv.style.display = 'none';
    if (tlv) tlv.style.display = '';
    const tabs = document.querySelectorAll('.view-tab');
    tabs.forEach(t => t.classList.remove('active'));
    if (tabs[1]) tabs[1].classList.add('active');
    renderTimeline();
  }
}

function bindMainEvents(root) {
  // Event delegation for data-action buttons
  root.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (btn) {
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      switch (action) {
        case 'edit-maint': openMaintModal(id); break;
        case 'delete-maint': deleteMaint(id); break;
        case 'add-maint': openMaintModal(); break;
        case 'update-mileage': openMileageModal(); break;
        case 'edit-car': openCarModal(id); break;
        case 'delete-car': deleteCar(id); break;
      }
      return;
    }
    // Tree toggles
    const toggle = e.target.closest('[data-toggle-group]');
    if (toggle) {
      toggleTreeGroup(toggle.dataset.toggleGroup);
      return;
    }
    // View tabs
    const viewTab = e.target.closest('[data-view]');
    if (viewTab) {
      switchView(viewTab.dataset.view, viewTab);
      return;
    }
  });
}

// ─────────────────────────────────────────────
//  View toggle & Timeline
// ─────────────────────────────────────────────
let currentView = 'table';
let tlTypeFilters = new Set(); // empty = all shown
let tlDateFrom = '';
let tlDateTo = '';

const TYPE_COLORS = [
  '#2563eb','#16a34a','#d97706','#dc2626','#7c3aed',
  '#0891b2','#db2777','#65a30d','#ea580c','#4f46e5',
  '#0d9488','#b91c1c','#ca8a04','#6d28d9','#059669',
  '#e11d48','#2563eb','#9333ea','#c2410c','#0284c7',
];

function getTypeColor(type, allTypes) {
  const idx = allTypes.indexOf(type);
  return TYPE_COLORS[idx % TYPE_COLORS.length];
}

function toggleTreeGroup(groupId) {
  const rows = document.querySelectorAll('.' + groupId);
  const tog = document.getElementById('tog_' + groupId);
  const isOpen = tog && tog.classList.contains('open');
  rows.forEach(r => r.style.display = isOpen ? 'none' : '');
  if (tog) tog.classList.toggle('open');
}

function switchView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const tv = document.getElementById('tableView');
  const tlv = document.getElementById('timelineView');
  if (view === 'table') {
    tv.style.display = '';
    tlv.style.display = 'none';
  } else {
    tv.style.display = 'none';
    tlv.style.display = '';
    renderTimeline();
  }
}

function getTimelineMileageDiff(latestMaint, currentMileage) {
  if (!latestMaint || latestMaint.mileage == null || latestMaint.mileage === '') {
    return Number.NEGATIVE_INFINITY;
  }
  return currentMileage - Number(latestMaint.mileage);
}

function toggleTypeFilter(type) {
  if (tlTypeFilters.has(type)) tlTypeFilters.delete(type);
  else tlTypeFilters.add(type);
  renderTimeline();
}

function tlSelectAll() { tlTypeFilters.clear(); renderTimeline(); }
function tlDeselectAll() {
  const car = selectedCar();
  if (!car) return;
  const types = [...new Set((car.maintenances || []).map(m => m.type))];
  tlTypeFilters = new Set(types);
  renderTimeline();
}

function onTlDateChange() {
  tlDateFrom = document.getElementById('tlDateFrom')?.value || '';
  tlDateTo = document.getElementById('tlDateTo')?.value || '';
  renderTimeline();
}

function renderTimeline() {
  const container = document.getElementById('timelineView');
  if (!container) return;
  const car = selectedCar();
  if (!car || !(car.maintenances || []).length) {
    container.innerHTML = '<div class="timeline-empty"><span class="icon">📅</span>尚無保養記錄，無法顯示時間軸</div>';
    return;
  }

  const maints = car.maintenances || [];
  const allTypes = [...new Set(maints.map(m => m.type))].sort();
  const currentMileage = car.mileage || 0;
  const latestByType = getLatestByType(maints);

  // Collect all events (past + planned)
  let events = [];
  maints.forEach(m => {
    if (m.date) events.push({ type: m.type, date: m.date, kind: 'done', mileage: m.mileage, note: m.note });
    if (m.nextDate) events.push({ type: m.type, date: m.nextDate, kind: 'planned', mileage: m.interval ? (Number(m.mileage) + Number(m.interval)) : null, note: '' });
  });

  // Apply type filter
  const visibleTypes = allTypes.filter(t => !tlTypeFilters.has(t));
  const sortedVisibleTypes = [...visibleTypes].sort((a, b) => {
    const diff = getTimelineMileageDiff(latestByType[b], currentMileage) - getTimelineMileageDiff(latestByType[a], currentMileage);
    if (diff !== 0) return diff;

    const latestDateDiff = (latestByType[b]?.date || '').localeCompare(latestByType[a]?.date || '');
    if (latestDateDiff !== 0) return latestDateDiff;

    return a.localeCompare(b, 'zh-TW');
  });

  // Apply date filter
  const fromDate = tlDateFrom || null;
  const toDate = tlDateTo || null;

  let filtered = events.filter(e => visibleTypes.includes(e.type));
  if (fromDate) filtered = filtered.filter(e => e.date >= fromDate);
  if (toDate) filtered = filtered.filter(e => e.date <= toDate);

  // Determine date range for axis
  const allDates = filtered.map(e => e.date).filter(Boolean);
  if (!allDates.length) {
    container.innerHTML = buildTimelineFilters(allTypes, visibleTypes, fromDate, toDate) +
      '<div class="timeline-empty"><span class="icon">🔍</span>篩選條件下沒有保養記錄</div>';
    bindTimelineEvents();
    return;
  }

  if (car.purchaseDate) allDates.push(car.purchaseDate);
  allDates.sort();
  let minDate = new Date(allDates[0]);
  let maxDate = new Date(allDates[allDates.length - 1]);

  // Pad range by ~5% on each side or at least 30 days
  const rangeDays = Math.max(60, (maxDate - minDate) / 86400000);
  const padDays = Math.max(15, Math.round(rangeDays * 0.05));
  minDate = new Date(minDate.getTime() - padDays * 86400000);
  maxDate = new Date(maxDate.getTime() + padDays * 86400000);

  const totalMs = maxDate - minDate;

  // Generate tick marks (roughly 6-10 ticks)
  const ticks = generateTicks(minDate, maxDate);

  // Today line position
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayPct = Math.max(0, Math.min(100, ((today - minDate) / totalMs) * 100));
  const showToday = today >= minDate && today <= maxDate;

  // Build chart rows
  const rowsHtml = sortedVisibleTypes.map(type => {
    const typeEvents = filtered.filter(e => e.type === type);
    const color = getTypeColor(type, allTypes);
    const gridLines = ticks.map(t => {
      const pct = ((t - minDate) / totalMs) * 100;
      return `<div class="tl-gridline" style="left:${pct}%"></div>`;
    }).join('');

    // Sort events by date for connecting bars
    const sortedEvents = [...typeEvents].sort((a, b) => a.date.localeCompare(b.date));

    // Build connecting bars and mileage labels between consecutive done events
    let barsHtml = '';
    const doneEvents = sortedEvents.filter(e => e.kind === 'done' && e.mileage != null);
    // Bar from purchase date (initial mileage) to first done event
    if (car.purchaseDate && doneEvents.length > 0) {
      const firstEvt = doneEvents[0];
      const purchDate = new Date(car.purchaseDate);
      const firstDate = new Date(firstEvt.date);
      if (purchDate < firstDate && purchDate >= minDate) {
        const pctP = ((purchDate - minDate) / totalMs) * 100;
        const pctF = ((firstDate - minDate) / totalMs) * 100;
        const midP = (pctP + pctF) / 2;
        const diffKmInit = Math.abs(Number(firstEvt.mileage) - Number(car.initialMileage || 0));
        barsHtml += `<div class="tl-bar" style="left:${pctP}%;width:${pctF - pctP}%;border-color:${color};background:${hexToRgba(color,0.15)};"></div>`;
        barsHtml += `<div class="tl-mileage-label" style="left:${midP}%;">${fmtKm(diffKmInit)} km</div>`;
      }
    }
    for (let i = 0; i < doneEvents.length - 1; i++) {
      const e1 = doneEvents[i], e2 = doneEvents[i + 1];
      const d1 = new Date(e1.date), d2 = new Date(e2.date);
      const pct1 = ((d1 - minDate) / totalMs) * 100;
      const pct2 = ((d2 - minDate) / totalMs) * 100;
      const midPct = (pct1 + pct2) / 2;
      const diffKm = Math.abs(Number(e2.mileage) - Number(e1.mileage));
      barsHtml += `<div class="tl-bar" style="left:${pct1}%;width:${pct2 - pct1}%;border-color:${color};background:${hexToRgba(color,0.15)};"></div>`;
      barsHtml += `<div class="tl-mileage-label" style="left:${midPct}%;">${fmtKm(diffKm)} km</div>`;
    }

    // Latest done event → show diff to current mileage
    if (doneEvents.length > 0) {
      const latest = doneEvents[doneEvents.length - 1];
      const latestDate = new Date(latest.date);
      const latestPct = ((latestDate - minDate) / totalMs) * 100;
      if (showToday && todayPct > latestPct) {
        const diffKm = currentMileage - Number(latest.mileage);
        const midPct = (latestPct + todayPct) / 2;
        barsHtml += `<div class="tl-bar" style="left:${latestPct}%;width:${todayPct - latestPct}%;border-color:${color};border-style:dashed;background:${hexToRgba(color,0.08)};"></div>`;
        barsHtml += `<div class="tl-mileage-label current-diff" style="left:${midPct}%;">${diffKm >= 0 ? '+' : ''}${fmtKm(diffKm)} km</div>`;
      }
    }

    const dots = sortedEvents.map(e => {
      const d = new Date(e.date);
      const pct = ((d - minDate) / totalMs) * 100;
      const opacity = e.kind === 'planned' ? '0.5' : '1';
      const border = e.kind === 'planned' ? `border:2.5px dashed ${color}; background:#fff;` : `background:${color};`;
      const kmText = e.mileage != null ? `里程：${fmtKm(e.mileage)} km` : '';
      const kindLabel = e.kind === 'planned' ? '（預定）' : '';
      const noteText = e.note ? `<br>${esc(e.note.substring(0, 30))}${e.note.length > 30 ? '…' : ''}` : '';
      return `<div class="tl-event" style="left:${pct}%;${border}opacity:${opacity};">
        <div class="tl-event-tooltip">
          <strong>${esc(type)}</strong> ${kindLabel}<br>
          日期：${formatDate(e.date)}<br>
          ${kmText}${noteText}
        </div>
      </div>`;
    }).join('');

    return `<div class="tl-row">
      <div class="tl-row-label" title="${esc(type)}"><span class="chip-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:5px;vertical-align:middle;"></span>${esc(type)}</div>
      <div class="tl-row-track">
        ${gridLines}
        ${showToday ? `<div class="tl-today-line" style="left:${todayPct}%"></div>` : ''}
        ${barsHtml}
        ${dots}
      </div>
    </div>`;
  }).join('');

  // Header ticks
  const headerTicks = ticks.map(t => {
    const pct = ((t - minDate) / totalMs) * 100;
    return `<div class="tl-date-label" style="position:absolute;left:${pct}%;transform:translateX(-50%);">${t.getFullYear()}/${String(t.getMonth()+1).padStart(2,'0')}</div>`;
  }).join('');

  const headerGridLines = ticks.map(t => {
    const pct = ((t - minDate) / totalMs) * 100;
    return `<div class="tl-gridline" style="left:${pct}%;top:-30px;"></div>`;
  }).join('');

  const chartHtml = `
    <div class="timeline-chart">
      <div class="tl-header-row">
        <div class="tl-label-col">保養項目</div>
        <div class="tl-dates-col" style="height:20px;">
          ${headerTicks}
        </div>
      </div>
      ${rowsHtml}
      <div style="display:flex;flex-wrap:wrap;gap:16px;margin-top:12px;padding-left:140px;">
        <div style="display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--gray-400);">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--gray-500);"></span> 已完成
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--gray-400);">

function buildTimelineFilters(allTypes, visibleTypes, fromDate, toDate) {
  const chips = allTypes.map((type, i) => {
    const color = getTypeColor(type, allTypes);
    const active = visibleTypes.includes(type) ? ' active' : '';
    return `<label class="filter-chip${active}" data-filter-type="${escAttr(type)}">
      <span class="chip-dot" style="background:${color}"></span>
      ${esc(type)}
    </label>`;
  }).join('');

  return `
    <div class="timeline-filters">
      <div class="timeline-filter-group">
        <span class="filter-label">保養項目</span>
        ${chips}
        <div class="filter-actions">
          <button data-tl-action="select-all">全選</button>
          <button data-tl-action="deselect-all">全不選</button>
        </div>
      </div>
    </div>
    <div class="timeline-filters" style="border-bottom:1px solid var(--gray-100);">
      <div class="timeline-date-range">
        <span class="filter-label">日期範圍</span>
        <input type="date" id="tlDateFrom" value="${fromDate || ''}">
        <span>至</span>
        <input type="date" id="tlDateTo" value="${toDate || ''}">
        <button data-tl-action="clear-dates" style="font-size:.72rem;padding:3px 8px;border-radius:6px;border:1px solid var(--gray-200);background:#fff;color:var(--gray-500);cursor:pointer;">清除</button>
      </div>

}

function bindTimelineEvents() {
  const container = document.getElementById('timelineView');
  if (!container) return;
  container.querySelectorAll('[data-filter-type]').forEach(el => {
    el.addEventListener('click', () => toggleTypeFilter(el.dataset.filterType));
  });
  container.querySelectorAll('[data-tl-action]').forEach(el => {
    el.addEventListener('click', () => {
      switch (el.dataset.tlAction) {
        case 'select-all': tlSelectAll(); break;
        case 'deselect-all': tlDeselectAll(); break;
        case 'clear-dates':
          document.getElementById('tlDateFrom').value = '';
          document.getElementById('tlDateTo').value = '';
          onTlDateChange();
          break;
      }
    });
  });
  const fromEl = document.getElementById('tlDateFrom');
  const toEl = document.getElementById('tlDateTo');
  if (fromEl) fromEl.addEventListener('change', onTlDateChange);
  if (toEl) toEl.addEventListener('change', onTlDateChange);
}

function generateTicks(minDate, maxDate) {
  const diffMs = maxDate - minDate;
  const diffDays = diffMs / 86400000;
  const ticks = [];

  if (diffDays <= 90) {
    // Weekly ticks
    const d = new Date(minDate);
    d.setDate(d.getDate() - d.getDay()); // start of week
    while (d <= maxDate) {
      if (d >= minDate) ticks.push(new Date(d));
      d.setDate(d.getDate() + 7);
    }
  } else if (diffDays <= 365) {
    // Monthly ticks
    const d = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
    while (d <= maxDate) {
      if (d >= minDate) ticks.push(new Date(d));
      d.setMonth(d.getMonth() + 1);
    }
  } else if (diffDays <= 365 * 3) {
    // Quarterly ticks
    const d = new Date(minDate.getFullYear(), Math.floor(minDate.getMonth()/3)*3, 1);
    while (d <= maxDate) {
      if (d >= minDate) ticks.push(new Date(d));
      d.setMonth(d.getMonth() + 3);
    }
  } else {
    // Yearly ticks
    const d = new Date(minDate.getFullYear(), 0, 1);
    while (d <= maxDate) {
      if (d >= minDate) ticks.push(new Date(d));
      d.setFullYear(d.getFullYear() + 1);
    }
  }

  return ticks;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function fmtKm(n) {
  if (n == null || n === '') return '—';
  return Number(n).toLocaleString('zh-TW');
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
}

const _escMap = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' };
function esc(str) {
  return String(str || '').replace(/[&<>"']/g, c => _escMap[c]);
}

// Escape a value for safe use inside an HTML attribute (e.g. onclick, data-*)
function escAttr(str) {
  return esc(str).replace(/\\/g, '\\\\');
}

let _lastFocusedElement = null;

function openModal(id) {
  _lastFocusedElement = document.activeElement;
  const modal = document.getElementById(id);
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
  // Focus first focusable element inside modal
  requestAnimationFrame(() => {
    const focusable = modal.querySelector('button, [href], input:not([type=hidden]), select, textarea, [tabindex]:not([tabindex="-1"])');
    if (focusable) focusable.focus();
  });
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
  document.body.style.overflow = '';
  // Restore focus
  if (_lastFocusedElement && typeof _lastFocusedElement.focus === 'function') {
    _lastFocusedElement.focus();
    _lastFocusedElement = null;
  }
}

// Custom confirm dialog
let _confirmResolve = null;
function showConfirm(msg, okText = '確定') {
  return new Promise(resolve => {
    _confirmResolve = resolve;
    document.getElementById('confirmModalMsg').textContent = msg;
    document.getElementById('confirmModalOk').textContent = okText;
    openModal('confirmModal');
  });
}
function resolveConfirm(result) {
  closeModal('confirmModal');
  if (_confirmResolve) { _confirmResolve(result); _confirmResolve = null; }
}

// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) {
      if (el.id === 'confirmModal') { resolveConfirm(false); }
      else { closeModal(el.id); }
    }
  });
});

// Close on Esc
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const confirmEl = document.getElementById('confirmModal');
    if (confirmEl && confirmEl.classList.contains('show')) {
      resolveConfirm(false);
      return;
    }
    document.querySelectorAll('.modal-overlay.show').forEach(el => closeModal(el.id));
  }
});

function showToast(msg, type = '') {
  const tc = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
  t.innerHTML = `<span>${icon}</span>${esc(msg)}`;
  tc.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 400);
  }, 2800);
}

function exportJSON() {
  const json = JSON.stringify(appData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `車輛保養備份_${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('已匯出 JSON 備份 ✓', 'success');
}

async function importFromFile(file) {
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data || !Array.isArray(data.cars)) throw new Error('格式錯誤');

    // Validate imported data structure
    data.cars.forEach(car => {
      if (typeof car !== 'object' || !car) throw new Error('車輛格式錯誤');
      if (!car.id || typeof car.id !== 'string') car.id = uid();
      if (typeof car.name !== 'string' || !car.name.trim()) throw new Error('車輛缺少名稱');
      car.name = car.name.substring(0, 30);
      car.plate = String(car.plate || '').substring(0, 10);
      car.brand = String(car.brand || '').substring(0, 30);
      car.mileage = Math.max(0, Number(car.mileage) || 0);
      car.initialMileage = Math.max(0, Number(car.initialMileage) || 0);
      if (!Array.isArray(car.maintenances)) car.maintenances = [];
      car.maintenances.forEach(m => {
        if (typeof m !== 'object' || !m) throw new Error('保養記錄格式錯誤');
        if (!m.id || typeof m.id !== 'string') m.id = uid();
        if (!m.type || typeof m.type !== 'string') throw new Error('保養記錄缺少項目');
        m.type = m.type.substring(0, 30);
        m.mileage = Number(m.mileage) || 0;
        m.interval = m.interval ? Number(m.interval) : null;
        m.note = String(m.note || '').substring(0, 500);
      });
    });

    appData = { cars: data.cars, selectedCarId: data.selectedCarId || data.cars[0]?.id || null };
    await dbSaveAll(appData);
    sessionStorage.setItem('sessionActive', 'true');
    renderAll();
    showToast(`已匯入 ${appData.cars.length} 部車輛 ✓`, 'success');
  } catch(e) {
    showToast('匯入失敗：' + (e.message || '檔案格式不符'), 'error');
  }
}

function onImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  importFromFile(file);
}

async function saveAndClear() {
  if (appData.cars.length === 0) {
    showToast('目前沒有資料可匯出', '');
    return;
  }
  exportJSON();
  await dbClearAll();
  sessionStorage.removeItem('sessionActive');
  appData = { cars: [], selectedCarId: null };
  window.removeEventListener('beforeunload', onBeforeUnload);
  renderAll();
  showToast('備份完成，瀏覽器資料已清除，可安全關閉分頁 ✓', 'success');
}

// ─────────────────────────────────────────────
function showStartupModal(hasResidual) {
  const opts = document.getElementById('startupOptions');
  const cards = [];

  if (hasResidual) {
    cards.push(`
      <div class="startup-card" onclick="continueSession()">
        <span class="sc-icon">▶️</span>
        <div class="sc-text">
          <h4>繼續上次工作</h4>
          <p>載入瀏覽器中未清除的資料（共 ${appData.cars.length} 部車輛）</p>
        </div>
      </div>`);
  }

  cards.push(`
    <label class="startup-card">
      <span class="sc-icon">📂</span>
      <div class="sc-text">
        <h4>載入 JSON 備份檔案</h4>
        <p>從上次匯出的備份恢復全部資料</p>
      </div>
      <input type="file" id="startupFileInput" accept=".json" style="display:none;" onchange="onStartupImport(this)">
    </label>
    <div class="startup-card" onclick="startFresh()">
      <span class="sc-icon">🆕</span>
      <div class="sc-text">
        <h4>全新開始</h4>
        <p>清空資料，從頭建立車輛記錄</p>
      </div>
    </div>`);

  opts.innerHTML = cards.join('');
  openModal('startupModal');
}

async function onStartupImport(input) {
  const file = input.files[0];
  if (!file) return;
  closeModal('startupModal');
  await importFromFile(file);
}

async function startFresh() {
  await dbClearAll();
  appData = { cars: [], selectedCarId: null };
  sessionStorage.setItem('sessionActive', 'true');
  closeModal('startupModal');
  renderAll();
}

function continueSession() {
  sessionStorage.setItem('sessionActive', 'true');
  closeModal('startupModal');
  renderAll();
}

// ─────────────────────────────────────────────
//  Page lifecycle
// ─────────────────────────────────────────────
function onBeforeUnload(e) {
  if (appData.cars.length > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
}

window.addEventListener('beforeunload', onBeforeUnload);

window.addEventListener('pagehide', e => {
  if (!e.persisted) {
    sessionStorage.removeItem('sessionActive');
    // Note: synchronous IndexedDB clearing in pagehide is unreliable.
    // Residual data will be detected on next startup via the startup modal.
  }
});

window.addEventListener('resize', () => {
  if (syncSidebarViewportState()) {
    renderSidebar();
  }
});

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
async function init() {
  try {
    await openDB();
  } catch(e) {
    console.error('IndexedDB 開啟失敗', e);
    showStartupModal(false);
    return;
  }

  const isRefresh = sessionStorage.getItem('sessionActive') === 'true';

  if (isRefresh) {
    // 同一 session（重新整理）→ 直接從 DB 載入
    try {
      const cars = await dbGetAllCars();
      const selectedCarId = await dbGetSetting('selectedCarId');
      appData = { cars, selectedCarId };
    } catch(e) {
      appData = { cars: [], selectedCarId: null };
    }
    renderAll();
  } else {
    // 全新開啟 → 檢查 DB 是否有殘留資料（瀏覽器崩潰等）
    let residualCars = [];
    try { residualCars = await dbGetAllCars(); } catch(e) {}

    if (residualCars.length > 0) {
      const selectedCarId = await dbGetSetting('selectedCarId');
      appData = { cars: residualCars, selectedCarId };
      showStartupModal(true);
    } else {
      showStartupModal(false);
    }
  }
}

init();
</script>
</body>
</html>
